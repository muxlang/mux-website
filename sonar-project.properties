sonar.projectKey=muxlang_mux-website
sonar.organization=muxlang
sonar.exclusions=**/node_modules/**,build/**,.docusaurus/**
# The website has no unit-test tooling (CI runs lint/typecheck/build only), so no
# coverage report is produced. Exclude UI source from coverage so the new-code
# coverage gate does not fail on every PR that adds frontend code.
sonar.coverage.exclusions=src/**/*.tsx,src/**/*.ts
